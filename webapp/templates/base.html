<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% block title %}Notes{% endblock %}</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
  <header class="topbar">
    <div class="topbar__inner">
      <a class="topbar__brand" href="{{ url_for('notes.index') }}">Notes</a>
      <nav class="topbar__nav">
        <a href="{{ url_for('notes.index') }}">Список</a>
        <a href="{{ url_for('notes.stats') }}">Статистика</a>
        <a href="{{ url_for('notes.healthz') }}">Health</a>
      </nav>
    </div>
  </header>

  <main class="container">
    {% block content %}{% endblock %}
  </main>

  <footer class="footer">
    <span>webapp-notes · стартер для дня 4 курса Git Bootcamp</span>
  </footer>

  <script src="{{ url_for('static', filename='app.js') }}"></script>
</body>
</html>
